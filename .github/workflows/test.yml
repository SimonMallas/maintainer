name: CI Tests for Drills\n\non: [push, pull_request]\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n    steps:\n    - uses: actions/checkout@v3\n    - name: Set up Python\n      uses: actions/setup-python@v4\n      with:\n        python-version: '3.12'\n    - name: Install dependencies\n      run: |\n        pip install -r requirements.txt  # assume\n        pip install pytest\n    - name: Run drills tests\n      run: |\n        pytest tests/ -v\n    - name: Check core functions\n      run: |\n        python -c \"import main; print('Core ok')\"  # stub\n